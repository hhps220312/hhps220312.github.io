<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はじめポータル</title>

  <link rel="icon" href="icon.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="icon.jpg">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* 共通設定 & 背景画像 */
    body {
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      
      /* 背景画像の設定 */
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;

      /* 画面を左右に分割するための親コンテナ設定 */
      min-height: 100vh;
      display: flex;
      justify-content: flex-start; /* 左端から配置 */
      align-items: flex-start;     /* 上寄せ */
      padding-top: 100px;          /* 上からの位置（コンテンツが始まる高さ） */
      padding-bottom: 60px;        /* 下の方にゆったりとした余白を確保 */
    }

    /* 白ベース＆黒枠立体の「はじめポータル」タイトル */
    .portal-title {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 16px;
      border: 2px solid #000;
      border-radius: 5px;
      margin: 0;
      box-shadow: 0 4px 0px rgba(0, 0, 0, 0.15);
    }

    /* 左右のコンテンツを包むメインコンテナ */
    .flex-wrapper {
      display: flex;
      width: 100%;
      margin-left: 3%;             /* 全体の開始点を左端に寄せる */
      gap: 15%;                    /* ボタンとカレンダーの間隔（お友達の写真用） */
      align-items: flex-start;     /* 上のラインを揃える */
    }

    /* 左側のコンテンツコンテナ（時計とボタン） */
    .left-container {
      width: 100%;
      max-width: 280px;            
      flex-shrink: 0;              
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 右側のコンテナ（カレンダーと打刻ボタンを含む） */
    .right-container {
      flex-grow: 1;                
      max-width: 680px;            /* 右側に伸ばしたサイズを維持 */
      display: flex;
      flex-direction: column;
      gap: 15px;                   /* カレンダーと打刻ボタンの間の隙間 */
      margin-bottom: 40px;         
    }

    /* カレンダー自体の外枠デザイン */
    .calendar-box {
      background: rgba(255, 255, 255, 0.9); 
      padding: 10px;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 0 6px 0px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
      width: 100%;
    }

    /* iframe（カレンダー本体）の縦幅 */
    .calendar-responsive {
      width: 100%;
      height: 480px;               
    }

    /* --- 打刻ボタンエリアのスタイル --- */
    .btn-container {
      display: flex;
      justify-content: flex-end;   /* 右寄せにする設定 */
      align-items: center;
      gap: 12px;                   /* ボタン同士の間隔 */
      padding: 10px 0;
      width: 100%;
      box-sizing: border-box;
    }
    
    .action-btn {
      background: #6bb6ff;
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 8px 16px; 
      color: #000000; 
      transition: 0.3s ease-in-out;
      font-weight: 600;
      font-size: 14px;
      border: 2px solid #000;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1;
      box-sizing: border-box;
      white-space: nowrap;
    }
    .action-btn:before {
      content: "";
      width: 100%;
      height: 100%;
      position: absolute;
      top: -2px; 
      left: -2px;
      z-index: -1;
      border: 2px solid #000;
      border-radius: 5px;
      background: #e1f3ff;
      background-image:
      linear-gradient(45deg, #c8e4ff 25%, transparent 0),
      linear-gradient(45deg, transparent 75%, #c8e4ff 0),
      linear-gradient(45deg, #c8e4ff 25%, transparent 0),
      linear-gradient(45deg, transparent 75%, #c8e4ff 0);
      background-position: 0 0, 15px 15px, 15px 15px, 30px 30px;
      background-size: 30px 30px;
    }
    .action-btn:after {
      position: absolute;
      top: -2px;
      left: -2px;
      width: 100%;
      height: 100%;
      content: '';
      transition: all .3s;
      transform: translate3d(0, 0.3rem, -1rem);
      border: 2px solid #000;
      border-radius: inherit;
      background: #2b7fde;
      box-shadow: 0 0.3rem 0 0 rgb(0 0 0 / 20%);
      z-index: -2;
    }
    .action-btn:hover {
      transform: translate3d(0, 0.15rem, -1rem);
    }
    .action-btn:hover:after {
      transform: translate3d(0, 0.15rem, -1rem);
      box-shadow: 0 0.15rem 0 0 rgb(0 0 0 / 20%);
    }

    /* --- 左側リンクボタンのスタイル --- */
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 12px;
      row-gap: 25px;
      width: 100%;
      box-sizing: border-box;
    }
    .button_solid016 {
      width: 100%;
    }
    .button_solid016 a {
      background: #6bb6ff;
      border-radius: 3px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      width: 100%; 
      padding: 10px 8px;
      color: #000000;
      transition: 0.3s ease-in-out;
      font-weight: 600;
      font-size: 13px;
      border: 2px solid #000;
      z-index: 1;
      border-radius: 5px;
      text-decoration: none;
      box-sizing: border-box;
      white-space: nowrap;
    }
    .button_solid016 a:before {
      content: "";
      width: 100%;
      height: 100%;
      position: absolute;
      z-index: -1;
      border: 2px solid #000;
      border-radius: 5px;
      background: #e1f3ff;
      background-image:
      linear-gradient(45deg, #c8e4ff 25%, transparent 0),
      linear-gradient(45deg, transparent 75%, #c8e4ff 0),
      linear-gradient(45deg, #c8e4ff 25%, transparent 0),
      linear-gradient(45deg, transparent 75%, #c8e4ff 0);
      background-position: 0 0, 15px 15px, 15px 15px, 30px 30px;
      background-size: 30px 30px;
    }
    .button_solid016 a:after {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      content: '';
      transition: all .3s;
      transform: translate3d(0,0.35rem,-1rem);
      border: 2px solid #000;
      border-radius: inherit;
      background: #2b7fde;
      box-shadow: 0 0.35rem 0 0 rgb(0 0 0 / 20%);
      z-index: -2;
    }
    .button_solid016 a i {
      position: absolute;
      right: 5px;
      font-size: 11px;
    }
    .button_solid016 a:hover {
      transform: translate3d(0,0.15rem,-1rem);
    }
    .button_solid016 a:hover:after {
      transform: translate3d(0,0.15rem,-1rem);
      box-shadow: 0 0.15rem 0 0 rgb(0 0 0 / 20%);
    }

    /* --- 時計のスタイル --- */
    .clock-container {
      border: 2px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      background-color: #fff;
      display: flex;
      justify-content: center;
      width: 100%;
      box-sizing: border-box;
      align-items: baseline;
      gap: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .date-time {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      white-space: nowrap;
    }
    .seconds {
      font-size: 12px;
      color: #666;
      font-weight: normal;
      white-space: nowrap;
    }

    /* スマホ・タブレット表示用の微調整（縦並びにする） */
    @media (max-width: 1024px) {
      body {
        justify-content: center;
        align-items: flex-start;
        padding-top: 90px;
      }
      .flex-wrapper {
        flex-direction: column;
        align-items: center;
        margin-left: 0;
        gap: 40px;
      }
      .left-container {
        max-width: 280px;
      }
      .right-container {
        width: 100%;
      }
      .btn-container {
        justify-content: center; /* 画面が狭いときはボタンを中央寄せに */
      }
    }
  </style>

  <script>
    function updateClock() {
      const now = new Date();
      
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      const dateTimeString = `${year}年${month}月${date}日 ${hours}:${minutes}`;
      const secondsString = `${seconds}秒`;
      
      document.getElementById('clock').textContent = dateTimeString;
      document.getElementById('seconds').textContent = secondsString;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
